<p-toolbar>
  <ng-template #start>
    <span class="header-title">{{ title() }}</span>
    @if (username()) {
      <span class="header-user">&mdash; {{ username() }}</span>
    }
  </ng-template>
  <ng-template #end>
    <div class="header-actions">
      <span
        class="ws-status"
        [class.ws-connected]="wsStatus() === 'connected'"
        [class.ws-reconnecting]="wsStatus() === 'reconnecting'"
        [class.ws-disconnected]="wsStatus() === 'disconnected'"
        [title]="wsStatus() === 'connected' ? 'Real-time sync active' : wsStatus() === 'reconnecting' ? 'Reconnecting...' : 'Disconnected'"
        data-testid="ws-status"
      >
        <i class="pi pi-circle-fill ws-status-dot"></i>
        <span class="ws-status-label">{{ wsStatus() === 'connected' ? 'Live' : wsStatus() === 'reconnecting' ? '...' : 'Off' }}</span>
      </span>
      <p-button
        [icon]="isDark() ? 'pi pi-sun' : 'pi pi-moon'"
        [rounded]="true"
        [text]="true"
        (onClick)="themeToggle.emit()"
        data-testid="theme-toggle"
      />
      <p-select
        [options]="languages"
        [(ngModel)]="selectedLang"
        (onChange)="onLangChange($event.value)"
        optionLabel="label"
        optionValue="value"
        [style]="{ width: '100px' }"
        data-testid="lang-switcher"
      />
      @if (logoutVisible()) {
        <p-button
          [label]="'COMMON.LOGOUT' | translate"
          icon="pi pi-sign-out"
          severity="secondary"
          [outlined]="true"
          (onClick)="logoutClick.emit()"
          data-testid="logout-btn"
        />
      }
    </div>
  </ng-template>
</p-toolbar>
